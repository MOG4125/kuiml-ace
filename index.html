<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUIML Ace</title>
    <script>
        // Detect mobile device using multiple signals for reliability
        function isMobile() {
            // Check user agent for mobile indicators
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            const mobileRegex = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini|Mobile|mobile|CriOS/i;
            const isMobileUA = mobileRegex.test(ua);

            // Check screen width (tablets and phones)
            const isSmallScreen = window.innerWidth <= 1024;

            // Check for touch capability (most mobile devices)
            const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

            // Check orientation API (mobile devices typically support this)
            const hasOrientation = typeof window.orientation !== 'undefined';

            // Use userAgentData if available (modern browsers)
            const isMobileData = navigator.userAgentData ? navigator.userAgentData.mobile : null;

            // If userAgentData explicitly says mobile, trust it
            if (isMobileData === true) return true;
            if (isMobileData === false && !isMobileUA) return false;

            // Combine signals: mobile UA + touch + small screen is strong signal
            // Or just mobile UA is enough for most cases
            return isMobileUA || (isTouch && isSmallScreen && hasOrientation);
        }

        // Redirect based on device type
        if (isMobile()) {
            window.location.replace('kuiml_ace_mobile.html');
        } else {
            window.location.replace('kuiml_ace.html');
        }
    </script>
    <style>
        body {
            margin: 0;
            background: #0d0d12;
            color: #e0e0e8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid #2a2a3a;
            border-top-color: #c75b5b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { color: #7a7a8a; font-size: 14px; }
        .links { margin-top: 24px; display: flex; gap: 16px; }
        .links a {
            color: #c75b5b;
            text-decoration: none;
            font-size: 13px;
            padding: 8px 16px;
            border: 1px solid #2a2a3a;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .links a:hover { background: #2a2a3a; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="loader"></div>
    <p>Detecting your device...</p>
    <noscript>
        <p>JavaScript is required. Please choose a version:</p>
        <div class="links">
            <a href="kuiml_ace.html">Desktop</a>
            <a href="kuiml_ace_mobile.html">Mobile</a>
        </div>
    </noscript>
    <div class="links" id="manualLinks" style="display:none;">
        <a href="kuiml_ace.html">Desktop Version</a>
        <a href="kuiml_ace_mobile.html">Mobile Version</a>
    </div>
    <script>
        // Show manual links after a short delay in case redirect fails
        setTimeout(() => {
            document.getElementById('manualLinks').style.display = 'flex';
        }, 1500);
    </script>
</body>
</html>
